name: Quality & Testing

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-format:
    name: Auto-fix Formatting
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Development Environment
        uses: ./.github/actions/setup-env
        with:
          mode: node

      - name: Auto-fix Prettier formatting
        run: npx prettier --write . --ignore-unknown --cache

      - name: Auto-fix Rust formatting
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml

      - name: Commit formatting fixes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto-fix formatting issues"
            git push
          else
            echo "No formatting changes to commit"
          fi

  rust-quality:
    name: Rust Code Quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    defaults:
      run:
        shell: bash
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Install Rust components
        shell: bash
        run: rustup component add rustfmt clippy

      - uses: rui314/setup-mold@v1

      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - name: Check Rust formatting
        run: cargo fmt --all -- --color=always --check

      - name: Run Clippy lints
        run: cargo hack --feature-powerset --exclude-features cli-build --no-dev-deps clippy # cspell:disable-line

  # Fast lane: runs on every PR and push. Skips the heavy real Tauri build
  # (kept under tests/index.js) but still covers Vitest + integration suites
  # so feedback stays under ~5 minutes per OS instead of 20+.
  validation-fast:
    name: CLI Fast Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Build CLI
        run: pnpm run cli:build

      # dist/cli.js is a tracked build artifact; a bin/ change without the
      # regenerated dist/cli.js ships stale CLI behavior. Linux only to avoid
      # cross-OS line-ending noise.
      - name: Verify committed dist/cli.js matches bin/ sources
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/cli.js is out of sync with bin/. Run 'pnpm run cli:build' and commit the regenerated dist/cli.js."
            exit 1
          fi

      - name: Run Fast Test Suite
        shell: bash
        run: PAKE_CREATE_APP=1 node tests/index.js --no-build
        timeout-minutes: 15
        env:
          CI: true
          NODE_ENV: test

      - name: Test CLI Integration (smoke)
        shell: bash
        run: |
          echo "Testing CLI integration..."
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            timeout 60s PAKE_CREATE_APP=1 node dist/cli.js https://weekly.tw93.fun --name "CITest" --debug --iterative-build || true
          else
            timeout 30s PAKE_CREATE_APP=1 node dist/cli.js https://weekly.tw93.fun --name "CITest" --debug --iterative-build || true
          fi

  # Full lane: only runs after merge to main (push event) or manual dispatch.
  # Keeps the real Tauri build coverage off the PR critical path.
  validation-full:
    name: Full Tauri Build (${{ matrix.os }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Run Full Test Suite (with real build)
        run: pnpm test
        timeout-minutes: 30
        env:
          CI: true
          NODE_ENV: test

  online-installer-build:
    name: Online Installer Build (${{ matrix.os }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Install Qt Installer Framework
        shell: bash
        run: bash scripts/pake-online/install-qtifw.sh

      - name: Install macOS DMG layout tool
        if: runner.os == 'macOS'
        shell: bash
        run: brew install create-dmg

      - name: Build and verify QtIFW online installer
        shell: bash
        timeout-minutes: 30
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Windows)
              config_os=windows
              payload="$(cygpath -w "$(command -v node)")"
              target="$RUNNER_TEMP/online-installer.exe"
              ;;
            macOS)
              config_os=macos
              payload="$RUNNER_TEMP/CI App.app"
              mkdir -p "$payload/Contents/MacOS"
              printf '#!/bin/sh\nexit 0\n' > "$payload/Contents/MacOS/ci-app"
              chmod +x "$payload/Contents/MacOS/ci-app"
              target="$RUNNER_TEMP/online-installer.app"
              ;;
            Linux)
              config_os=linux
              payload="$RUNNER_TEMP/CI.AppImage"
              printf '#!/bin/sh\nexit 0\n' > "$payload"
              chmod +x "$payload"
              target="$RUNNER_TEMP/online-installer"
              ;;
          esac
          config="$RUNNER_TEMP/qtifw-ci-config.json"
          node -e '
            const fs = require("fs");
            fs.writeFileSync(process.argv[1], JSON.stringify({
              id: `ci-${process.argv[2]}`,
              repository: "example/Pake",
              sourceBranch: "main",
              os: process.argv[2],
              cliConfig: { name: "CI App", appVersion: "1.0.0" }
            }));
          ' "$config" "$config_os"
          node scripts/pake-online/qtifw.mjs prepare \
            "$config" "$payload" "$RUNNER_TEMP/qtifw-workspace" 1
          suffix=""
          [[ "$RUNNER_OS" == "Windows" ]] && suffix=".exe"
          "$QTIFW_BIN/repogen$suffix" --remove --ac 9 \
            -p "$RUNNER_TEMP/qtifw-workspace/packages" \
            "$RUNNER_TEMP/qtifw-workspace/repository"
          "$QTIFW_BIN/binarycreator$suffix" --online-only \
            -c "$RUNNER_TEMP/qtifw-workspace/config/config.xml" \
            -p "$RUNNER_TEMP/qtifw-workspace/packages" \
            "$target"
          test -e "$target"
          case "$RUNNER_OS" in
            Windows)
              candle.exe -arch x64 \
                "-dQtIfwSource=$(cygpath -w "$target")" \
                "-dLauncherSource=$(cygpath -w "$RUNNER_TEMP/qtifw-workspace/windows-launcher.ps1")" \
                "-dIconSource=$(cygpath -w "$GITHUB_WORKSPACE/src-tauri/png/icon_256.ico")" \
                -out "$RUNNER_TEMP/online-installer.wixobj" \
                "$RUNNER_TEMP/qtifw-workspace/online-installer.wxs"
              light.exe -sval -ext WixUIExtension \
                -out "$RUNNER_TEMP/online-installer.msi" \
                "$RUNNER_TEMP/online-installer.wixobj"
              test -s "$RUNNER_TEMP/online-installer.msi"
              ;;
            macOS)
              executable="$(
                /usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' \
                  "$target/Contents/Info.plist"
              )"
              mv "$target/Contents/MacOS/$executable" \
                "$target/Contents/MacOS/pake-online-backend"
              swiftc "$RUNNER_TEMP/qtifw-workspace/macos-launcher.swift" \
                -framework AppKit -o "$target/Contents/MacOS/$executable"
              codesign --force --deep --sign - "$target"
              mkdir -p "$RUNNER_TEMP/dmg-source"
              cp -R "$target" "$RUNNER_TEMP/dmg-source/"
              create-dmg \
                --volname "CI App" \
                --background "src-tauri/assets/macos/dmg/background.png" \
                --window-size 680 420 \
                --icon "online-installer.app" 190 250 \
                --app-drop-link 500 250 \
                "$RUNNER_TEMP/online-installer.dmg" \
                "$RUNNER_TEMP/dmg-source"
              test -s "$RUNNER_TEMP/online-installer.dmg"
              ;;
            Linux)
              appdir="$RUNNER_TEMP/CI.AppDir"
              mkdir -p "$appdir/usr/share/applications"
              cp "$target" "$appdir/pake-online-backend"
              cp "$RUNNER_TEMP/qtifw-workspace/linux-launcher.sh" \
                "$appdir/AppRun"
              cp "src-tauri/png/icon_512.png" "$appdir/pake-app.png"
              printf '%s\n' \
                '[Desktop Entry]' \
                'Type=Application' \
                'Name=CI App' \
                'Exec=AppRun' \
                'Icon=pake-app' \
                'Terminal=false' \
                > "$appdir/pake-app.desktop"
              test -x "$appdir/AppRun"
              grep -q '^Name=CI App$' "$appdir/pake-app.desktop"
              ;;
          esac
          find "$RUNNER_TEMP/qtifw-workspace/repository" \
            -name '*content.7z' -type f -print -quit | grep -q .

      - name: Build and verify offline EXE wrapper
        if: runner.os == 'Windows'
        shell: bash
        env:
          PAKE_OFFLINE_APP_NAME: CI App
        run: |
          printf 'ci-msi-placeholder' > offline-installer/windows/ci-app.msi
          export PAKE_OFFLINE_MSI="$GITHUB_WORKSPACE/offline-installer/windows/ci-app.msi"
          export PAKE_OFFLINE_ICON="$GITHUB_WORKSPACE/src-tauri/png/icon_256.ico"
          cargo build --locked --release \
            --manifest-path offline-installer/windows/Cargo.toml
          test -f \
            offline-installer/windows/target/release/pake-offline-installer.exe

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs:
      [
        auto-format,
        rust-quality,
        validation-fast,
        validation-full,
        online-installer-build,
      ]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          {
            echo "# Quality & Testing Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Auto Formatting | ${{ needs.auto-format.result == 'success' && 'PASSED' || needs.auto-format.result == 'skipped' && 'SKIPPED' || 'FAILED' }} |"
            echo "| Rust Quality | ${{ needs.rust-quality.result == 'success' && 'PASSED' || 'FAILED' }} |"
            echo "| CLI Fast Validation | ${{ needs.validation-fast.result == 'success' && 'PASSED' || 'FAILED' }} |"
            echo "| Full Tauri Build | ${{ needs.validation-full.result == 'success' && 'PASSED' || needs.validation-full.result == 'skipped' && 'SKIPPED (PR fast lane)' || 'FAILED' }} |"
            echo "| Online Installer Build | ${{ needs.online-installer-build.result == 'success' && 'PASSED' || needs.online-installer-build.result == 'skipped' && 'SKIPPED (PR fast lane)' || 'FAILED' }} |"
          } >> $GITHUB_STEP_SUMMARY
